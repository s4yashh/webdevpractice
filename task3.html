<!DOCTYPE html>
<html>
<head>
    <title>Images and Hyperlinks</title>
</head>
<body>

    <h1>Images and Hyperlinks</h1>

    <hr>

    <!-- Clickable Image with External Link -->
    <a href="https://www.google.com" target="_blank">
        <img src="google.jpg" alt="Sample Image" width="300">
    </a>

    <p>
        Click the image above to open Google in a new tab.
    </p>

    <hr>

    <!-- External Link -->
    <p>
        Visit <a href="https://www.wikipedia.org" target="_blank">Wikipedia</a> for learning.
    </p>

    <!-- Internal Link -->
    <p>
        Go back to <a href="index.html">Home Page</a>.
    </p>

</body>
</html>
